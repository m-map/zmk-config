# Default 30. With PREF_INT=6 (7.5ms) and PREF_TIMEOUT=400 (4s), the safe
# ceiling is ~265; 99 gives ~750ms of skipped idle connection events on the
# split link without risking supervision timeout. Does not add keypress
# latency -- latency only applies when the peripheral has nothing to send.
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=99

# See the right half's battery level on the host. Low cost.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
