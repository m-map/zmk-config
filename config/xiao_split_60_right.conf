# The peripheral never presents HID. Board conf sets y; override it. UF2
# flashing is unaffected -- that is the Adafruit bootloader, reached by
# double-tapping reset, independent of the app.
CONFIG_ZMK_USB=n

# Cheap: the vbatt divider is gated by power-gpios so it only draws current
# during a sample.
CONFIG_ZMK_BATTERY_REPORTING=y
