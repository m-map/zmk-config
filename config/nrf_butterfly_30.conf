# Deep sleep. Not on by default. Also auto-selects PM_DEVICE and
# ZMK_PM_DEVICE_SUSPEND_RESUME, which is what suspends the QSPI flash.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Logging keeps a UART/USB endpoint and a log thread alive.
CONFIG_LOG=n
CONFIG_ZMK_USB_LOGGING=n
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n

# See the keyboard's battery level on the host. Low cost: the vbatt divider is
# gated by power-gpios so it only draws current during a sample.
CONFIG_ZMK_BATTERY_REPORTING=y

# BLE connection tuning so typing is smooth on every host. ZMK already prefers a
# fast 7.5-15ms connection interval, but its default peripheral latency of 30
# lets the keyboard skip up to 30 connection events when idle (~450ms). macOS
# negotiates that latency back down so typing stays smooth; Windows honors it,
# so keystrokes buffer and arrive in bursts. Pin latency to 0 so the radio is
# ready on every interval. Costs a little idle current (until ZMK sleep kicks
# in); raise the latency if battery life matters more than input smoothness.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
